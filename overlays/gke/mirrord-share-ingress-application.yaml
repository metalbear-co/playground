---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mirrord-share-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: mirrord
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://metalbear-co.github.io/charts
    chart: mirrord-operator-share-ingress
    targetRevision: 3.183.0
    helm:
      valuesObject:
        namespace: mirrord
        createNamespace: false
        shareIngress:
          # Must match operator.shareIngress.shareDomain on the mirrord-operator release.
          shareDomain: preview.playground.metalbear.dev
          # Where visitors land when a share host no longer maps to a live preview.
          appDomain: playground.metalbear.dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
