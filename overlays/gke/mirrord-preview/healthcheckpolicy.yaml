apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: mirrord-share-ingress-healthcheck
  namespace: mirrord
spec:
  default:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        # Container port behind the Service, which is what the NEG targets.
        port: 8080
  targetRef:
    group: ""
    kind: Service
    name: mirrord-share-ingress
