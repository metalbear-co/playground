apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mirrord-share-ingress
  namespace: mirrord
spec:
  parentRefs:
    - name: mirrord-preview-gateway
      namespace: mirrord
  hostnames:
    # The operator mints preview hosts as <slug>.preview.playground.metalbear.dev.
    - "*.preview.playground.metalbear.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mirrord-share-ingress
          namespace: mirrord
          port: 80
