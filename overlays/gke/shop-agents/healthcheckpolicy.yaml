apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: shop-agents-frontend-healthcheck
  namespace: shop-agents
spec:
  default:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 5
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /shop-agents/support
        port: 3000
  targetRef:
    group: ""
    kind: Service
    name: shop-agents-frontend
