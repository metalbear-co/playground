{{/* Per-attendee stack: inventory steal target + SA/token + namespaced RBAC + HTTPRoute. */}}
{{- range $i := until (int .Values.attendeeCount) }}
{{- $seat := include "ws.seat" (dict "i" $i "root" $) }}
{{- $ns := include "ws.ns" (dict "i" $i "root" $) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels: { app: inventory-service }
  template:
    metadata:
      labels:
        app: inventory-service
        {{- include "ws.labels" $ | nindent 8 }}
    spec:
      containers:
        - name: main
          image: {{ $.Values.images.inventory }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "80"
            - name: DATABASE_URL
              value: {{ include "ws.databaseUrl" $ | quote }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /health, port: 80 }
          livenessProbe:
            httpGet: { path: /health, port: 80 }
          resources:
            {{- toYaml $.Values.resources.inventory | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
spec:
  type: ClusterIP
  selector: { app: inventory-service }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: attendee
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
---
{{/* Long-lived token so the handed-out kubeconfig keeps working through the workshop
       (k8s >=1.24 no longer auto-creates these). The bootstrap script reads it to build kubeconfigs. */}}
apiVersion: v1
kind: Secret
metadata:
  name: attendee-token
  namespace: {{ $ns }}
  annotations:
    kubernetes.io/service-account.name: attendee
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
type: kubernetes.io/service-account-token
{{- if $.Values.rbac.enabled }}
---
{{/* Namespaced verbs mirrord needs in the attendee's own namespace. Cluster-scoped bits
       (namespaces, mirrordclustersessions) live in the ClusterRole in 40-rbac.yaml.
       VALIDATE against the pinned Operator version in the dry run. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: attendee
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policies.mirrord.metalbear.co"]
    resources: ["mirrordpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: attendee
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: attendee
subjects:
  - kind: ServiceAccount
    name: attendee
    namespace: {{ $ns }}
---
{{/* The actual steal right, scoped to THIS namespace only (operator's user ClusterRole, bound
     via a namespaced RoleBinding so the attendee can't steal other namespaces). */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: attendee-mirrord
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-user
subjects:
  - kind: ServiceAccount
    name: attendee
    namespace: {{ $ns }}
{{- end }}
---
{{/* Path-based routing for this seat:
         /aNN/products  -> this namespace's inventory-service (rewritten to /products)
         /aNN/...        -> shared static UI (rewritten to /...)
       Longer prefix (/aNN/products) wins over /aNN, so products hit inventory and the rest hits the UI. */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seat-route
  namespace: {{ $ns }}
  labels:
    {{- include "ws.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: workshop-gateway
      namespace: {{ $.Values.namespaces.system }}
  rules:
    - matches:
        - path: { type: PathPrefix, value: /{{ $seat }} }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplacePrefixMatch, replacePrefixMatch: / }
      backendRefs:
        - name: frontend
          port: 80
{{- end }}
