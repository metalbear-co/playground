{{- if .Values.finale.enabled }}
{{/* Finale: ONE shared inventory target. A MirrordPolicy blocks steal-without-filter, so every
       attendee must steal with their baggage session-key filter -> the Operator multiplexes all
       50 onto the same pod, each seeing only their own traffic. (Load-test this 50-on-1 pattern.) */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels: { app: inventory-service }
  template:
    metadata:
      labels:
        app: inventory-service
        {{- include "ws.labels" . | nindent 8 }}
    spec:
      containers:
        - name: main
          image: {{ .Values.images.inventory }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "80"
            - name: DATABASE_URL
              value: {{ include "ws.databaseUrl" . | quote }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /health, port: 80 }
          livenessProbe:
            httpGet: { path: /health, port: 80 }
          resources:
            {{- toYaml .Values.resources.inventory | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: { app: inventory-service }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: policies.mirrord.metalbear.co/v1alpha
kind: MirrordPolicy
metadata:
  name: block-steal-without-filter
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
spec:
  targetPath: "deploy/inventory-service"
  block:
    - steal-without-filter
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: finale-route
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: workshop-gateway
      namespace: {{ .Values.namespaces.system }}
  rules:
    - matches:
        - path: { type: PathPrefix, value: /finale/products }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplacePrefixMatch, replacePrefixMatch: /products }
      backendRefs:
        - name: inventory-service
          port: 80
    - matches:
        - path: { type: PathPrefix, value: /finale }
      filters:
        - type: URLRewrite
          urlRewrite:
            path: { type: ReplacePrefixMatch, replacePrefixMatch: / }
      backendRefs:
        - name: metalmart-ui
          namespace: {{ .Values.namespaces.shared }}
          port: 80
---
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: inventory-service-hc
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
spec:
  default:
    config:
      type: HTTP
      httpHealthCheck:
        requestPath: /health
        port: 80
  targetRef:
    group: ""
    kind: Service
    name: inventory-service
{{- if .Values.rbac.enabled }}
---
{{/* Every attendee SA gets read access to the finale target so they can steal it. */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: finale-target
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policies.mirrord.metalbear.co"]
    resources: ["mirrordpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: finale-target
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: finale-target
subjects:
  {{- range $i := until (int .Values.attendeeCount) }}
  - kind: ServiceAccount
    name: attendee
    namespace: {{ include "ws.ns" (dict "i" $i "root" $) }}
  {{- end }}
---
{{/* Steal right on the finale target for every attendee (operator user ClusterRole, scoped to
     the finale namespace via this RoleBinding). */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: finale-mirrord
  namespace: {{ .Values.namespaces.finale }}
  labels:
    {{- include "ws.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mirrord-operator-user
subjects:
  {{- range $i := until (int .Values.attendeeCount) }}
  - kind: ServiceAccount
    name: attendee
    namespace: {{ include "ws.ns" (dict "i" $i "root" $) }}
  {{- end }}
{{- end }}
{{- end }}
