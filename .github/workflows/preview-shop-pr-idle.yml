# Shop preview workflow gated by the `ephemeral` label.
# Starts changed shop services as mirrord previews in idle state
# (start_idle=true). Separate from preview-shop-pr.yml / gated — does not
# change existing shop preview behavior.
#
# Requires: GCP_WIF_PROVIDER + GCP_SERVICE_ACCOUNT + SLACK_WEBHOOK_URL secrets,
# mirrord operator with Enterprise license + idle preview support.
name: Preview Environment - Shop (Idle)
run-name: >-
  Idle Preview Shop -
  ${{
    github.event.action == 'closed' &&
    format('stop PR #{0}', github.event.pull_request.number) ||
    format('{0} PR #{1}', github.event.action, github.event.pull_request.number)
  }}

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, closed]

permissions:
  contents: read

concurrency:
  group: preview-shop-idle-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  resolve-context:
    name: Resolve trigger context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      mode: ${{ steps.resolve.outputs.mode }}
      branch: ${{ steps.resolve.outputs.branch }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      preview_key: ${{ steps.resolve.outputs.preview_key }}
      image_tag_key: ${{ steps.resolve.outputs.image_tag_key }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      pr_url: ${{ steps.resolve.outputs.pr_url }}
      should_comment: ${{ steps.resolve.outputs.should_comment }}
      services_reason: ${{ steps.resolve.outputs.services_reason }}
    steps:
      - name: Resolve PR event into shared outputs
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const sameRepoName = `${owner}/${repo}`;

            const trimmed = value => (value || '').trim();
            const sanitizeTag = value => {
              const sanitized = (value || '')
                .toLowerCase()
                .replace(/[^a-z0-9._-]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .slice(0, 60);
              return sanitized || 'idle-preview';
            };

            const branch = pr.head.ref;
            const isSameRepo = pr.head.repo.full_name === sameRepoName;
            const labels = (pr.labels || []).map(label => label.name);
            const hasEphemeralLabel = labels.includes('ephemeral');
            const changedLabel = context.payload.label?.name || '';
            const isEphemeralLabelEvent = changedLabel === 'ephemeral';
            // Stable per-PR key so demos can use baggage: mirrord-session=pr-N
            const previewKey = `pr-${pr.number}`;

            const out = {
              should_run: 'false',
              mode: (action === 'closed' || (action === 'unlabeled' && isEphemeralLabelEvent)) ? 'stop' : 'start',
              branch,
              base_ref: pr.base.ref,
              preview_key: previewKey,
              image_tag_key: sanitizeTag(`idle-${branch || previewKey}`),
              pr_number: String(pr.number),
              pr_url: pr.html_url,
              should_comment: 'false',
              services_reason: '',
            };

            if (!isSameRepo) {
              out.services_reason = 'fork-pr-not-supported';
            } else if (action === 'closed') {
              out.should_run = hasEphemeralLabel || isEphemeralLabelEvent ? 'true' : 'false';
              out.services_reason = 'pull_request:closed';
            } else if (action === 'unlabeled' && isEphemeralLabelEvent) {
              out.should_run = 'true';
              out.services_reason = 'pull_request:ephemeral-label-removed';
            } else if (action === 'labeled' && isEphemeralLabelEvent) {
              out.should_run = 'true';
              out.should_comment = 'true';
              out.services_reason = 'pull_request:ephemeral-label-added';
            } else if (hasEphemeralLabel) {
              out.should_run = 'true';
              out.should_comment = 'true';
              out.services_reason = `pull_request:${action}-with-ephemeral-label`;
            } else {
              out.services_reason = `pull_request:${action}-without-ephemeral-label`;
            }

            for (const [key, value] of Object.entries(out)) {
              core.setOutput(key, value);
            }

  detect-changes:
    name: Detect changed services
    needs: resolve-context
    if: needs.resolve-context.outputs.should_run == 'true' && needs.resolve-context.outputs.mode == 'start'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
      services_list: ${{ steps.build-matrix.outputs.services_list }}
      head_sha: ${{ steps.build-matrix.outputs.head_sha }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-context.outputs.branch }}

      - name: Detect changed services via git diff
        id: build-matrix
        env:
          BASE_REF: ${{ needs.resolve-context.outputs.base_ref }}
        run: |
          set -euo pipefail
          SERVICES_FILE=.github/preview-services-idle.json
          git fetch origin "$BASE_REF"
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          CHANGES='[]'
          for path in $(jq -r '.services[].path' "$SERVICES_FILE"); do
            name=$(jq -r --arg p "$path" '.services[] | select(.path == $p) | .name' "$SERVICES_FILE")
            if echo "$CHANGED_FILES" | grep -q "^${path}/"; then
              CHANGES=$(echo "$CHANGES" | jq -c --arg n "$name" '. + [$n]')
            fi
          done
          # Demo-friendly fallback: ephemeral label with no shop diffs still spins frontend idle
          COUNT=$(echo "$CHANGES" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            CHANGES='["metal-mart-frontend"]'
            echo "No shop service diffs; falling back to metal-mart-frontend for ephemeral demo"
          fi
          MATRIX=$(jq -c --argjson changes "$CHANGES" \
            '{include: [.services[] | select(.name as $n | $changes | index($n))]}' \
            "$SERVICES_FILE")
          SERVICES_LIST=$(jq -r --argjson changes "$CHANGES" \
            '[.services[] | select(.name as $n | $changes | index($n)) | .name] | join(", ")' \
            "$SERVICES_FILE")
          COUNT=$(echo "$CHANGES" | jq 'length')
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "services_list=$SERVICES_LIST" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changed services ($COUNT): $SERVICES_LIST"

  build-and-preview:
    name: Build & Idle Preview (${{ matrix.name }})
    needs: [resolve-context, detect-changes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-context.outputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/metalbear-co/playground-${{ matrix.name }}:idle-${{ needs.resolve-context.outputs.image_tag_key }}-${{ needs.detect-changes.outputs.head_sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: playground-cluster-1
          location: us-central1-c
          project_id: playground-383912

      - name: Start mirrord idle preview
        uses: metalbear-co/mirrord-preview@master
        with:
          action: start
          target: deployment/${{ matrix.deployment }}
          namespace: ${{ matrix.namespace }}
          image: ghcr.io/metalbear-co/playground-${{ matrix.name }}:idle-${{ needs.resolve-context.outputs.image_tag_key }}-${{ needs.detect-changes.outputs.head_sha }}
          mode: steal
          filter: 'baggage:\s*[^\n]*\bmirrord-session={{ key }}\b'
          ttl_mins: '120'
          key: ${{ needs.resolve-context.outputs.preview_key }}
          extra_config: ${{ matrix.extra_config }}

      - name: Write result artifact
        if: success()
        run: |
          mkdir -p /tmp/preview-results
          echo '{"name":"${{ matrix.name }}"}' > /tmp/preview-results/${{ matrix.name }}.json

      - name: Upload result artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: idle-preview-result-${{ matrix.name }}
          path: /tmp/preview-results/${{ matrix.name }}.json
          retention-days: 1

  notify:
    name: Post notifications
    needs: [resolve-context, detect-changes, build-and-preview]
    if: needs.detect-changes.outputs.has_changes == 'true' && !cancelled() && needs.resolve-context.outputs.should_comment == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Download all result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: idle-preview-result-*
          path: /tmp/preview-results
          merge-multiple: true

      - name: Post PR comment with idle preview details
        uses: actions/github-script@v7
        env:
          PREVIEW_KEY: ${{ needs.resolve-context.outputs.preview_key }}
          PR_NUMBER: ${{ needs.resolve-context.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const key = process.env.PREVIEW_KEY;
            const issueNumber = Number(process.env.PR_NUMBER);
            const url = 'https://playground.metalbear.dev/shop';

            const dir = '/tmp/preview-results';
            let services = [];
            try {
              const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
              services = files.map(f => JSON.parse(fs.readFileSync(path.join(dir, f), 'utf8')));
            } catch (e) {
              console.log('No preview results found, some or all previews may have failed.');
            }

            const serviceList = services.length > 0
              ? services.map(s => `| \`${s.name}\` | \`deployment/${s.name}\` |`).join('\n')
              : '| _(no previews succeeded)_ | |';

            const body = [
              '## mirrord Idle Preview - Metal Mart',
              '',
              'Idle preview environments are running for this PR (started idle; wake on first matching traffic).',
              '',
              '| Service | Target |',
              '|---|---|',
              serviceList,
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | [${url}](${url}) |`,
              `| **Header** | \`baggage: mirrord-session=${key}\` |`,
              `| **Idle** | starts idle · sleeps after 5m idle · wake timeout 2m |`,
              '',
              'To send traffic to this preview (and wake it):',
              `- Use the [mirrord Browser Extension](https://metalbear.com/mirrord/docs/using-mirrord/browser-extension) and set the header for this URL, or`,
              `- \`curl -H "baggage: mirrord-session=${key}" ${url}\``,
              '',
              '*Stopped when the `ephemeral` label is removed or the PR is closed.*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const marker = '## mirrord Idle Preview - Metal Mart';
            const botComment = comments.find(c => c.body && c.body.includes(marker));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }

      - name: Post idle preview link to Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "mirrord Idle Preview - Metal Mart" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*PR:*\n<${{ needs.resolve-context.outputs.pr_url }}|#${{ needs.resolve-context.outputs.pr_number }}>" },
                    { "type": "mrkdwn", "text": "*Services:*\n${{ needs.detect-changes.outputs.services_list }}" },
                    { "type": "mrkdwn", "text": "*Preview URL:*\n<https://playground.metalbear.dev/shop|Open Preview>" },
                    { "type": "mrkdwn", "text": "*Header:*\n`baggage: mirrord-session=${{ needs.resolve-context.outputs.preview_key }}`" }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  preview-stop:
    name: Stop idle previews
    needs: resolve-context
    if: needs.resolve-context.outputs.should_run == 'true' && needs.resolve-context.outputs.mode == 'stop'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: playground-cluster-1
          location: us-central1-c
          project_id: playground-383912

      - name: Stop mirrord preview
        uses: metalbear-co/mirrord-preview@master
        with:
          action: stop
          key: ${{ needs.resolve-context.outputs.preview_key }}
