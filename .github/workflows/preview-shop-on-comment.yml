# Comment-triggered mirrord-ci E2E gate for the Shop services.
#
# When a reviewer comments `/preview` on a PR:
#   1. Detect which services changed (same matrix as preview-shop-pr.yml)
#   2. Run a per-service mirrord-ci E2E gate against staging
#   3. If every gated service passes, dispatch preview-shop-pr.yml to publish
#      a per-PR preview environment
#   4. Post a sticky PR comment summarising the gate + dispatched preview
#
# Reuses .github/preview-services.json (services with `e2e_command` +
# `e2e_script` opt in to the gate; others are skipped without failing).
#
# Requires: MIRRORD_CI_API_KEY + GCP_WIF_PROVIDER + GCP_SERVICE_ACCOUNT secrets.
# Note: `issue_comment` always runs the workflow file from the default branch,
# so this file must be on `main` before `/preview` works on any PR.
name: Preview Shop - On Comment
run-name: >-
  Preview Shop on /preview - PR #${{ github.event.issue.number }}

on:
  issue_comment:
    types: [created]

concurrency:
  group: preview-shop-on-comment-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  resolve-pr:
    name: Resolve PR context
    if: >-
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/preview'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      allowed: ${{ steps.pr.outputs.allowed }}
      reject_reason: ${{ steps.pr.outputs.reject_reason }}
      same_repo: ${{ steps.pr.outputs.same_repo }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      base_ref: ${{ steps.pr.outputs.base_ref }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_url: ${{ steps.pr.outputs.pr_url }}
    steps:
      - id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const assoc = context.payload.comment.author_association || 'NONE';

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            const sameRepo = pr.data.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const allowed = sameRepo && allowedAssociations.has(assoc);
            const rejectReason = !sameRepo
              ? 'fork-pr-not-supported'
              : (!allowedAssociations.has(assoc) ? `commenter-not-allowed:${assoc}` : '');

            core.setOutput('allowed', allowed ? 'true' : 'false');
            core.setOutput('reject_reason', rejectReason);
            core.setOutput('same_repo', String(sameRepo));
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_ref', pr.data.base.ref);
            core.setOutput('pr_number', String(pr.data.number));
            core.setOutput('pr_url', pr.data.html_url);

  reject-request:
    name: Reject unauthorized request
    needs: resolve-pr
    if: needs.resolve-pr.outputs.allowed != 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          REASON: ${{ needs.resolve-pr.outputs.reject_reason }}
        with:
          script: |
            const body = [
              '<!-- preview-shop-on-comment -->',
              '## mirrord-ci Gate',
              '',
              ':no_entry_sign: `/preview` request was not started.',
              '',
              `Reason: \`${process.env.REASON}\``,
              '',
              'Requirements:',
              '- PR branch must live in this repository, not a fork',
              '- commenter must be an OWNER, MEMBER, or COLLABORATOR',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });

  detect-changes:
    name: Detect changed services
    needs: resolve-pr
    if: needs.resolve-pr.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
      services_list: ${{ steps.build-matrix.outputs.services_list }}
      head_sha: ${{ steps.build-matrix.outputs.head_sha }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-pr.outputs.head_ref }}

      - name: Detect changed services via git diff
        id: build-matrix
        env:
          BASE_REF: ${{ needs.resolve-pr.outputs.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF"
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          CHANGES='[]'
          for path in $(jq -r '.services[].path' .github/preview-services.json); do
            name=$(jq -r --arg p "$path" '.services[] | select(.path == $p) | .name' .github/preview-services.json)
            if echo "$CHANGED_FILES" | grep -q "^${path}/"; then
              CHANGES=$(echo "$CHANGES" | jq -c --arg n "$name" '. + [$n]')
            fi
          done
          MATRIX=$(jq -c --argjson changes "$CHANGES" \
            '{include: [.services[] | select(.name as $n | $changes | index($n))]}' \
            .github/preview-services.json)
          SERVICES_LIST=$(jq -r --argjson changes "$CHANGES" \
            '[.services[] | select(.name as $n | $changes | index($n)) | .name] | join(", ")' \
            .github/preview-services.json)
          COUNT=$(echo "$CHANGES" | jq 'length')
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "services_list=$SERVICES_LIST" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Changed services ($COUNT): $SERVICES_LIST"

  e2e-gate:
    name: E2E Gate (${{ matrix.name }})
    needs: [resolve-pr, detect-changes]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      id-token: write
    env:
      SERVICE_KEY: ci-${{ github.run_id }}-${{ matrix.name }}
    steps:
      - name: Decide whether this service has a gate
        id: gate-config
        env:
          MATRIX_NAME: ${{ matrix.name }}
          E2E_COMMAND: ${{ matrix.e2e_command }}
          E2E_SCRIPT: ${{ matrix.e2e_script }}
        run: |
          if [ -z "$E2E_COMMAND" ] || [ -z "$E2E_SCRIPT" ]; then
            echo "No E2E configured for $MATRIX_NAME, skipping gate."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        if: steps.gate-config.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-pr.outputs.head_ref }}

      - name: Setup Node.js
        if: steps.gate-config.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build service
        if: steps.gate-config.outputs.skip != 'true'
        working-directory: ${{ matrix.path }}
        run: |
          npm ci
          npm run build

      - name: Authenticate to GCP via Workload Identity Federation
        if: steps.gate-config.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        if: steps.gate-config.outputs.skip != 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: playground-cluster-1
          location: us-central1-c
          project_id: playground-383912

      - name: Install mirrord
        if: steps.gate-config.outputs.skip != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/metalbear-co/mirrord/main/scripts/install.sh | bash
          mirrord --version

      - name: Generate mirrord ci config
        if: steps.gate-config.outputs.skip != 'true'
        env:
          NAMESPACE: ${{ matrix.namespace }}
          DEPLOYMENT: ${{ matrix.deployment }}
        run: |
          mkdir -p .mirrord-tmp
          cat > .mirrord-tmp/ci.json <<EOF
          {
            "target": {
              "namespace": "${NAMESPACE}",
              "path": { "deployment": "${DEPLOYMENT}" }
            },
            "ci": { "output_dir": "/tmp/mirrord" },
            "feature": {
              "network": {
                "incoming": {
                  "mode": "steal",
                  "http_filter": {
                    "header_filter": "baggage:\\\\s*[^\\\\n]*\\\\bmirrord=${SERVICE_KEY}\\\\b"
                  }
                },
                "outgoing": true
              },
              "fs": { "mode": "read" }
            }
          }
          EOF
          cat .mirrord-tmp/ci.json

      - name: Start mirrord ci and run E2E
        if: steps.gate-config.outputs.skip != 'true'
        env:
          MIRRORD_CI_API_KEY: ${{ secrets.MIRRORD_CI_API_KEY }}
          SHOP_URL: https://playground.metalbear.dev
          BAGGAGE_HEADER: mirrord=${{ env.SERVICE_KEY }}
          E2E_COMMAND: ${{ matrix.e2e_command }}
          E2E_SCRIPT: ${{ matrix.e2e_script }}
        run: |
          chmod +x "$E2E_SCRIPT"
          mirrord ci start --config-file .mirrord-tmp/ci.json -- bash -c '
            $E2E_COMMAND &
            APP_PID=$!
            "$E2E_SCRIPT"
            TEST_RC=$?
            kill $APP_PID 2>/dev/null || true
            exit $TEST_RC
          '

      - name: Stop mirrord ci session
        if: always() && steps.gate-config.outputs.skip != 'true'
        run: mirrord ci stop || true

      - name: Upload mirrord logs
        if: always() && steps.gate-config.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-gate-${{ matrix.name }}-mirrord-logs
          path: /tmp/mirrord
          if-no-files-found: ignore

  dispatch-preview:
    name: Dispatch preview-shop-pr.yml
    needs: [resolve-pr, detect-changes, e2e-gate]
    if: needs.detect-changes.outputs.has_changes == 'true' && needs.e2e-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    outputs:
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
    steps:
      - id: dispatch
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ needs.resolve-pr.outputs.head_ref }}
          BASE_REF: ${{ needs.resolve-pr.outputs.base_ref }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          PR_URL: ${{ needs.resolve-pr.outputs.pr_url }}
          CALLER_RUN_ID: ${{ github.run_id }}
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'preview-shop-pr.yml',
              ref: 'main',
              inputs: {
                action: 'start',
                branch: process.env.BRANCH,
                base_ref: process.env.BASE_REF,
                preview_key: `pr-${process.env.PR_NUMBER}`,
                pr_number: process.env.PR_NUMBER,
                pr_url: process.env.PR_URL,
                caller_run_id: process.env.CALLER_RUN_ID,
              },
            });
            core.setOutput('dispatched', 'true');

  notify:
    name: Post sticky comment
    needs: [resolve-pr, detect-changes, e2e-gate, dispatch-preview]
    if: always() && needs.resolve-pr.result == 'success' && needs.resolve-pr.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr_number }}
          SERVICES_LIST: ${{ needs.detect-changes.outputs.services_list }}
          HAS_CHANGES: ${{ needs.detect-changes.outputs.has_changes }}
          GATE_RESULT: ${{ needs.e2e-gate.result }}
          DISPATCH_RESULT: ${{ needs.dispatch-preview.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const issueNumber = Number(process.env.PR_NUMBER);
            const marker = '<!-- preview-shop-on-comment -->';
            const services = process.env.SERVICES_LIST || '(none)';
            const hasChanges = process.env.HAS_CHANGES === 'true';
            const gate = process.env.GATE_RESULT || 'skipped';
            const dispatch = process.env.DISPATCH_RESULT || 'skipped';
            const runUrl = process.env.RUN_URL;

            const gateBadge = {
              success: ':white_check_mark: passed',
              failure: ':x: failed',
              cancelled: ':grey_exclamation: cancelled',
              skipped: ':white_circle: skipped',
            }[gate] || `:question: ${gate}`;

            const dispatchLine = dispatch === 'success'
              ? ':rocket: preview environment dispatched (`preview-shop-pr.yml`)'
              : (gate === 'success'
                  ? `:warning: preview dispatch did not run (status: ${dispatch})`
                  : ':no_entry: preview not dispatched (gate did not pass)');

            const body = [
              marker,
              '## mirrord-ci Gate',
              '',
              hasChanges
                ? `**Changed services:** ${services}`
                : '**No registered service paths changed** — nothing to gate.',
              '',
              `**E2E gate:** ${gateBadge}`,
              `**Preview:** ${dispatchLine}`,
              '',
              `[View gate run](${runUrl})`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body,
              });
            }
