name: Release ip visit GCP Pub/Sub consumer
on:
  push:
    branches: [main]
    paths:
      - "apps/ip-visit/ip-visit-gcp-pubsub-consumer/**"
      - ".github/workflows/build-ip-visit-gcp-pubsub-consumer.yaml"
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          file: apps/ip-visit/ip-visit-gcp-pubsub-consumer/Dockerfile
          platforms: linux/amd64,linux/arm64
          context: apps/ip-visit/ip-visit-gcp-pubsub-consumer/
          push: true
          tags: |
            ghcr.io/metalbear-co/playground-ip-visit-gcp-pubsub-consumer:latest
            ghcr.io/metalbear-co/playground-ip-visit-gcp-pubsub-consumer:${{ github.sha }}
