# Slash-command entry point for shop previews.
# This workflow is intentionally lightweight: it parses `/preview` comments on PRs
# and dispatches preview-shop-pr.yml, but never checks out or executes PR code in
# the trusted issue_comment context.
#
# NOTE: `/preview` is now handled by preview-shop-on-comment.yml, which adds a
# mirrord-ci E2E gate before dispatching. To avoid both workflows running on the
# same comment, this workflow is kept as a manually-invokable template only —
# it no longer auto-triggers on PR comments.
name: Preview Environment - Shop Command

on:
  workflow_dispatch:

jobs:
  dispatch-preview:
    name: Dispatch preview from /preview comment
    if: false  # disabled: /preview is now handled by preview-shop-on-comment.yml
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Resolve PR and validate request
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const allowedAssociations = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const assoc = context.payload.comment.author_association || 'NONE';
            const prNumber = context.payload.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const sameRepo = pr.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            const allowed = sameRepo && allowedAssociations.has(assoc);

            core.setOutput('allowed', allowed ? 'true' : 'false');
            core.setOutput('branch', pr.head.ref);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('preview_key', pr.head.ref);
            core.setOutput('reason', !sameRepo ? 'fork-pr-not-supported' : (!allowedAssociations.has(assoc) ? `commenter-not-allowed:${assoc}` : 'ok'));

      - name: Acknowledge rejected request
        if: steps.resolve.outputs.allowed != 'true'
        uses: actions/github-script@v7
        env:
          REASON: ${{ steps.resolve.outputs.reason }}
        with:
          script: |
            const body = [
              'Preview request was not started.',
              '',
              `Reason: \`${process.env.REASON}\``,
              '',
              'Requirements:',
              '- PR branch must live in this repository, not a fork',
              '- commenter must be an OWNER, MEMBER, or COLLABORATOR',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });

      - name: Dispatch preview workflow
        if: steps.resolve.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'preview-shop-pr.yml',
              ref: context.payload.repository.default_branch,
              inputs: {
                action: 'start',
                branch: '${{ steps.resolve.outputs.branch }}',
                base_ref: '${{ steps.resolve.outputs.base_ref }}',
                preview_key: '${{ steps.resolve.outputs.preview_key }}',
                pr_number: '${{ steps.resolve.outputs.pr_number }}',
                pr_url: '${{ steps.resolve.outputs.pr_url }}',
                caller_run_id: String(context.runId),
              },
            });

      - name: Acknowledge accepted request
        if: steps.resolve.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Preview requested. Dispatching `preview-shop-pr.yml` now.',
            });
