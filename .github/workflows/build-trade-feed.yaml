name: Release trade feed
on:
  push:
    branches: [main]
    paths:
      - apps/trading-demo/trade-feed/**
      - .github/workflows/build-trade-feed.yaml
  workflow_dispatch:
jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/trading-demo/trade-feed
          file: ./apps/trading-demo/trade-feed/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/metalbear-co/playground-trade-feed:latest
            ghcr.io/metalbear-co/playground-trade-feed:${{ github.sha }}
