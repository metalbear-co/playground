name: Release shop-agents order agent

on:
  push:
    branches: [main]
    paths:
      - apps/shop-agents/shared/**
      - apps/shop-agents/order-agent/**
      - .github/workflows/build-shop-agents-order.yaml
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: ./apps/shop-agents
          file: ./apps/shop-agents/order-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/metalbear-co/playground-shop-agents-order:latest
            ghcr.io/metalbear-co/playground-shop-agents-order:${{ github.sha }}
