apiVersion: apps/v1
kind: Deployment
metadata:
  name: fix-gateway
spec:
  selector:
    matchLabels:
      app: fix-gateway
  template:
    metadata:
      labels:
        app: fix-gateway
    spec:
      containers:
        - name: main
          image: ghcr.io/metalbear-co/playground-fix-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: FIX_PORT
              value: "9876"
            - name: TRADE_FEED_HOST
              value: "trade-feed"
            - name: TRADE_FEED_PORT
              value: "9999"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9876
              name: fix
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
