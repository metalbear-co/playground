# Attaches kafka-demo to the shared playground Gateway (playground.metalbear.dev),
# exactly like shop/ip-visit/visualization do. PathPrefix /kafka-demo is forwarded
# unchanged (no rewrite) to the gateway service, which serves under BASE_PATH=/kafka-demo.
# Additive — does not modify the shared Gateway. URL: https://playground.metalbear.dev/kafka-demo
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-demo-httproute
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: playground-gateway
      namespace: argocd
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kafka-demo
      backendRefs:
        - group: ""
          kind: Service
          name: gateway
          namespace: kafka-demo
          port: 80
          weight: 1
