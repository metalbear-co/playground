apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
  annotations:
    # Container-native load balancing for the GCE ingress (matches shop/default).
    cloud.google.com/neg: '{"ingress":true}'
spec:
  selector:
    app: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
