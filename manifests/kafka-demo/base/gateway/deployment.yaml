apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: main
          image: ghcr.io/metalbear-co/playground-kafka-demo-gateway:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "80"
            # Which context formats the OTel propagator injects/extracts. The
            # `baggage` entry is what carries mirrord-session across every hop.
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: KAFKA_ADDRESS
              value: "kafka.infra.svc.cluster.local:9092"
            - name: FIRST_TOPIC
              value: "kafka-demo.a"
            - name: TRACE_TOPIC
              value: "kafka-demo.trace"
            - name: TRACE_GROUP_ID
              value: "kafka-demo-gateway"
            # Persist the button click counter so it survives gateway restarts
            # (reuses the cluster Postgres). The connection string lives in a
            # Secret (created out-of-band; see scripts/deploy.sh), never in git.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kafka-demo-db
                  key: url
            # Serve the UI + API under this sub-path so a non-rewriting GCE ingress
            # can expose it at http://<lb-ip>/kafka-demo/. Health stays at root.
            - name: BASE_PATH
              value: "/kafka-demo"
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
