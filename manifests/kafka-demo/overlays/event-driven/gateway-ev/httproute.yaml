# Attaches the event-driven gateway to the shared playground Gateway at
# /kafka-demo-ev (forwarded unchanged; the app serves under BASE_PATH=/kafka-demo-ev).
# Additive — the base /kafka-demo route is untouched.
# URL: https://playground.metalbear.dev/kafka-demo-ev
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kafka-demo-ev-httproute
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: playground-gateway
      namespace: argocd
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /kafka-demo-ev
      backendRefs:
        - group: ""
          kind: Service
          name: gateway-ev
          namespace: kafka-demo
          port: 80
          weight: 1
