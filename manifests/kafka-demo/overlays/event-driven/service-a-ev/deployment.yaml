apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a-ev
  labels:
    app: service-a-ev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-a-ev
  template:
    metadata:
      labels:
        app: service-a-ev
    spec:
      containers:
        - name: main
          image: ghcr.io/metalbear-co/playground-kafka-demo-service-a:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "80"
            - name: OTEL_PROPAGATORS
              value: "tracecontext,baggage"
            - name: KAFKA_ADDRESS
              value: "kafka.infra.svc.cluster.local:9092"
            - name: KAFKA_TOPIC
              value: "kafka-demo.ev.a"
            - name: NEXT_TOPIC
              value: "kafka-demo.ev.b"
            - name: TRACE_TOPIC
              value: "kafka-demo.ev.trace"
            - name: KAFKA_CONSUMER_GROUP
              value: "service-a-ev"
            - name: STAGE
              value: "a"
            - name: SERVICE_NAME
              value: "service-a"
          ports:
            - containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
