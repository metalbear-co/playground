apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Event-driven mode: A -> B(writes DB state) -> CronJob Z(reads DB, emits) -> C.
# Deployed in its OWN kafka-demo-event namespace (the base A->B->C demo stays in
# kafka-demo), with kafka-demo.ev.* topics on the shared Kafka, so both run at once.
#
# The namespace and the Kafka MirrordPropertyList (kafka-demo-connection, referenced
# by the split configs, and which must live in the same namespace as the targets)
# ship with this overlay. The DB secret (kafka-demo-db) holds a credential and is
# created out-of-band by scripts/deploy-event-driven.sh — never committed.
namespace: kafka-demo-event

resources:
  - namespace.yaml
  - kafka-property-list.yaml
  - gateway-ev
  - service-a-ev
  - service-b-ev
  - service-c-ev
  - cronjob-z

commonLabels:
  env: playground
  team: kafka-demo
