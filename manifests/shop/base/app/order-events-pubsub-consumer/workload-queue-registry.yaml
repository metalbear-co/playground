# Queue entry key MUST match feature.split_queues in
# apps/shop/order-events-pubsub-consumer/mirrord.json ("order-pubsub").
apiVersion: queues.mirrord.metalbear.co/v1alpha
kind: MirrordWorkloadQueueRegistry
metadata:
  name: order-events-pubsub-queue-registry
spec:
  queues:
    order-pubsub:
      queueType: GCPPubSub
      nameSource:
        envVar: PUBSUB_SUBSCRIPTION_ID
  consumer:
    name: order-events-pubsub-consumer
    workloadType: Deployment
