---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-events-pubsub-consumer
  annotations:
    metalbear.co/note: >-
      Ensure Pub/Sub topic/subscription exist in GOOGLE_CLOUD_PROJECT; pods need GCP ADC (e.g. GKE Workload Identity).
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-events-pubsub-consumer
  template:
    metadata:
      labels:
        app: order-events-pubsub-consumer
    spec:
      serviceAccountName: order-events-pubsub
      containers:
        - name: main
          image: ghcr.io/metalbear-co/playground-order-events-pubsub-consumer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: PORT
              value: "80"
            - name: GOOGLE_CLOUD_PROJECT
              value: playground-383912
            - name: PUBSUB_SUBSCRIPTION_ID
              value: metal-mart-order-events-sub
          livenessProbe:
            httpGet:
              path: /health
              port: 80
              scheme: HTTP
          readinessProbe:
            httpGet:
              path: /health
              port: 80
              scheme: HTTP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
