
services:
  order-service:
    target:
      namespace: shop
      path: deployment/order-service
    run:
       command: ["npm", "--prefix", "apps/shop/order-service", "run", "dev"] 

  inventory-service:
    target:
      namespace: shop
      path: deployment/inventory-service
    run:
       command: ["npm", "--prefix", "apps/shop/inventory-service", "run", "dev"] 
  delivery-service:
    target:
      namespace: shop
      path: deployment/delivery-service
    run:
       command: ["npm", "--prefix", "apps/shop/delivery-service", "run", "dev"]      